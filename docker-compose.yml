##############################################################################
# Hive — Docker Compose 部署
#
# 架构说明：
#   hive      主服务（Go 二进制 + 内嵌前端），默认监听 18080
#   postgres  PostgreSQL 16，存储运行时配置和会话数据
#   minio     S3-compatible 对象存储，保存 KB 图片、附件和 Agent 资产
#
# Sandbox DooD（Docker outside of Docker）说明：
#   Hive 通过 /var/run/docker.sock 与宿主机 Docker daemon 通信，
#   在宿主机上创建 sandbox 容器（hive-sandbox:latest），
#   而非在容器内运行嵌套 Docker daemon。
#
#   关键约束：sandbox 通过 DooD 在「宿主机」上 docker run -v <host>:<host>，
#   因此 Hive 容器内也必须存在相同路径；本文件将「宿主机目录」挂载到容器内
#   /opt/hive/workdir（与 config.docker.json 中 sessions_dir 一致）。
#
#   宿主机路径由变量 HIVE_WORKDIR_HOST 控制（见下方 volumes）。
#   未设置时 Compose 默认 ./.hive-workdir（全平台安全，尤其 Docker Desktop for Mac）。
#   推荐使用「make docker-up / make docker-setup」：Makefile 会按 OS 自动设置
#   HIVE_WORKDIR_HOST（macOS/Windows 类 → 项目 .hive-workdir；Linux → /opt/hive/workdir）。
#   也可在 .env 中显式写 HIVE_WORKDIR_HOST=... 覆盖任意自动逻辑。
#
# 首次启动前：
#   1. 构建 sandbox 镜像（宿主机上）：
#        make build-sandbox-image
#   2. 设置环境变量或 .env 文件（含 POSTGRES_PASSWORD、MINIO_* 等）：
#        make docker-setup
#   3. 启动（推荐 make，自动 HIVE_WORKDIR_HOST）：
#        make docker-up
#   或手动：mkdir -p .hive-workdir/sessions && docker compose up -d
#
# runtime 镜像会内置 docker/config.docker.json 到 /app/config.json，并默认
# 以 --config /app/config.json 启动；如修改 docker/config.docker.json，需要重建镜像。
##############################################################################

services:

  # --------------------------------------------------------------------------
  # Hive 主服务
  # --------------------------------------------------------------------------
  hive:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    image: hive:latest
    container_name: hive
    restart: unless-stopped
    ports:
      - "${HIVE_PORT:-18080}:18080"
    environment:
      # ── PostgreSQL 连接 ────────────────────────────────────────────
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: claw
      POSTGRES_USER: claw
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?请在 .env 中设置 POSTGRES_PASSWORD}
      POSTGRES_SSL_MODE: disable

      # ── 会话 & 工具目录 ────────────────────────────────────────────
      SESSIONS_DIR: /opt/hive/workdir/sessions
      CUSTOM_TOOLS_DIR: /data/tools
      ASSET_PROVIDER: ${ASSET_PROVIDER:-minio}
      MINIO_ENDPOINT: ${MINIO_ENDPOINT:-minio:9000}
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-${MINIO_ROOT_USER:-minioadmin}}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-${MINIO_ROOT_PASSWORD:-minioadmin}}
      MINIO_BUCKET: ${MINIO_BUCKET:-hive-assets}
      MINIO_USE_SSL: ${MINIO_USE_SSL:-false}
      FILECONV_PDF_PROVIDER: ${FILECONV_PDF_PROVIDER:-mineru}
      FILECONV_PDF_INSTALL_ENABLED: ${FILECONV_PDF_INSTALL_ENABLED:-true}
      FILECONV_PDF_INSTALL_DIR: /data/fileconv/mineru

      # ── LLM 密钥（首次启动后写入数据库，后续可通过 Web UI 修改）──
      CLAW_API_KEY: ${CLAW_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      TZ: ${TZ:-Asia/Shanghai}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ${HIVE_WORKDIR_HOST:-./.hive-workdir}:/opt/hive/workdir
      - hive-logs:/data/logs
      - hive-tools:/data/tools

    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy

    group_add:
      - "${DOCKER_GID:-999}"

    networks:
      - hive-net

  # --------------------------------------------------------------------------
  # PostgreSQL 数据库
  # --------------------------------------------------------------------------
  postgres:
    image: postgres:16-alpine
    container_name: hive-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: claw
      POSTGRES_USER: claw
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?请在 .env 或环境变量中设置 POSTGRES_PASSWORD}
      TZ: ${TZ:-Asia/Shanghai}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U claw -d claw"]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 10s
    networks:
      - hive-net
    ports:
      - "127.0.0.1:5432:5432"

  # --------------------------------------------------------------------------
  # MinIO 对象存储
  # --------------------------------------------------------------------------
  minio:
    image: ${MINIO_IMAGE:-minio/minio:latest}
    container_name: hive-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
      TZ: ${TZ:-Asia/Shanghai}
    volumes:
      - minio-data:/data
    ports:
      - "${MINIO_API_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 10s
    networks:
      - hive-net

  minio-init:
    image: ${MINIO_IMAGE:-minio/minio:latest}
    container_name: hive-minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: ["/bin/sh", "-c"]
    command:
      - >
        mc alias set hive http://minio:9000 "$$MINIO_ROOT_USER" "$$MINIO_ROOT_PASSWORD" &&
        mc mb -p "hive/$${MINIO_BUCKET:-hive-assets}" || true
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
      MINIO_BUCKET: ${MINIO_BUCKET:-hive-assets}
    networks:
      - hive-net

volumes:
  postgres-data:
    name: hive-postgres-data
  hive-logs:
    name: hive-logs
  hive-tools:
    name: hive-tools
  minio-data:
    name: hive-minio-data

networks:
  hive-net:
    name: hive-net
    driver: bridge
