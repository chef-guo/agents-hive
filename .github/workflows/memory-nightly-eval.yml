name: memory-nightly-eval

on:
  schedule:
    - cron: '17 19 * * *'
  workflow_dispatch:

jobs:
  deterministic:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: Run deterministic memory nightly eval
        run: |
          go test ./internal/memory/nightlyeval ./cmd/memory-nightly-eval -count=1
          go run ./cmd/memory-nightly-eval -junit memory-nightly-eval.xml
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: memory-nightly-eval
          path: memory-nightly-eval.xml
